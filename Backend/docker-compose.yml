services:
  stakeit-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stakeit-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - stakeit-db
    restart: unless-stopped

  stakeit-db:
    image: postgres:17
    container_name: stakeit-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - stakeit_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  stakeit_postgres_data: