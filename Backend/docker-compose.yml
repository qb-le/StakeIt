services:
  db:
    image: postgres:17
    container_name: stakeit-db
    environment:
      POSTGRES_DB: stakeit_db
      POSTGRES_USER: stakeit_user
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - stakeit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stakeit_user -d stakeit_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: stakeit-app
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stakeit_db
      SPRING_DATASOURCE_USERNAME: stakeit_user
      SPRING_DATASOURCE_PASSWORD: test
    depends_on:
      db:
        condition: service_healthy

volumes:
  stakeit_postgres_data: